aid: salesflare
name: Salesflare
description: >-
  Salesflare is an intelligent CRM built for B2B startups and small businesses
  that automates data input by pulling contact and company information from
  emails, calendars, phone logs, and social profiles. The platform provides a
  REST API for programmatically managing accounts, contacts, opportunities,
  tasks, and email messages. Developers can use the API to integrate CRM data
  into their own applications, automate sales workflows, and synchronize data
  across systems. Salesflare supports bearer token authentication via API keys
  generated from the settings dashboard, with endpoints covering the full CRM
  object model including leads, pipelines, and enriched contact records.
